<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿財哥計費小幫手</title>
    <style>
        :root {
            --primary-orange: #FF9F43;
            --secondary-yellow: #FECA57;
            --bg-color: #FFF9F1;
            --text-color: #576574;
            --accent-blue: #54a0ff;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.2);
            border: 4px solid var(--primary-orange);
        }
        .header {
            text-align: center;
            background: var(--primary-orange);
            margin: -20px -20px 20px -20px;
            padding: 20px;
            border-radius: 25px 25px 0 0;
            color: white;
        }
        .header h1 { margin: 0; font-size: 24px; }
        
        /* 服務切換按鈕 */
        .service-toggle {
            display: flex;
            background: #eee;
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 5px;
        }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .toggle-btn.active {
            background: var(--primary-orange);
            color: white;
        }

        .section {
            background: #FFF;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #FFEAA7;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #E67E22;
        }
        select, input[type="number"], button {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 2px solid #FFD3B6;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        .checkbox-row input { width: 25px; height: 25px; accent-color: var(--primary-orange); }
        
        button {
            background: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: 900;
            box-shadow: 0 5px 0 #D35400;
            cursor: pointer;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #D35400; }

        #result {
            margin-top: 20px;
            padding: 20px;
            background: #FFF3E0;
            border-radius: 20px;
            border: 3px dashed var(--primary-orange);
            display: none;
        }
        .price-tag { font-size: 2rem; color: #D35400; font-weight: 900; text-align: center; }
        .footer-text { text-align: center; font-size: 12px; color: #AAA; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚕 阿財哥計費小幫手</h1>
        <p>無障礙接送 | 機場包車 | 爬梯服務</p>
    </div>

    <div class="service-toggle">
        <div id="btn-meter" class="toggle-btn active" onclick="switchMode('meter')">一般跳錶加價</div>
        <div id="btn-airport" class="toggle-btn" onclick="switchMode('airport')">機場 / 包車</div>
    </div>

    <div class="section">
        <label>📅 選日期時段</label>
        <select id="dayType">
            <option value="weekday">平日 (週一至週五)</option>
            <option value="sat">週六 (週末)</option>
            <option value="sun">週日 / 國定假日</option>
            <option value="special">特殊節慶 (春節、颱風)</option>
        </select>
        <label style="margin-top:10px;">⏰ 預約時間</label>
        <select id="hour">
            <script>
                for(let i=0; i<24; i++) {
                    let h = i < 10 ? '0'+i : i;
                    document.write(`<option value="${i}">${h}:00 ~ ${h}:59</option>`);
                }
            </script>
        </select>
    </div>

    <div id="airport-section" class="section" style="display:none; border-color: #54a0ff;">
        <label style="color:#2e86de;">✈️ 選擇機場/包車項目</label>
        <select id="airportPrice">
            <option value="1500">桃園機場接送 (估 $1500)</option>
            <option value="1000">松山機場接送 (估 $1000)</option>
            <option value="2400">短期包車 (3小時 $2400)</option>
            <option value="6400">全日包車 (8小時 $6400)</option>
            <option value="0">自訂金額 (手輸)</option>
        </select>
        <input type="number" id="customPrice" placeholder="請輸入金額" style="margin-top:10px; display:none;">
    </div>

    <div class="section">
        <label>🪜 爬梯機服務</label>
        <select id="floor">
            <option value="0">不需要</option>
            <option value="2">2樓 / 3樓</option>
            <option value="4">4樓</option>
            <option value="5">5樓</option>
            <option value="6">6樓</option>
            <option value="7">7樓</option>
        </select>
    </div>

    <div class="section">
        <div class="checkbox-row">
            <input type="checkbox" id="carType"> <span>🚗 指定車款 (+100)</span>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="wheelchair"> <span>♿ 借用輪椅 (+100)</span>
        </div>
    </div>

    <button onclick="calculate()">✨ 開始試算</button>

    <div id="result">
        <div id="resultDetail"></div>
    </div>

    <div class="footer-text">
        本工具僅供參考，實際金額以阿財哥報價為準
    </div>
</div>

<script>
    let currentMode = 'meter';

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('btn-meter').classList.toggle('active', mode === 'meter');
        document.getElementById('btn-airport').classList.toggle('active', mode === 'airport');
        document.getElementById('airport-section').style.display = (mode === 'airport') ? 'block' : 'none';
        document.getElementById('result').style.display = 'none';
    }

    document.getElementById('airportPrice').onchange = function() {
        document.getElementById('customPrice').style.display = (this.value === "0") ? "block" : "none";
    };

    function calculate() {
        const dayType = document.getElementById('dayType').value;
        const hour = parseInt(document.getElementById('hour').value);
        const floor = parseInt(document.getElementById('floor').value);
        const carType = document.getElementById('carType').checked;
        const wheelchair = document.getElementById('wheelchair').checked;
        const isNegotiate = (hour >= 23 || hour < 7);

        let baseFee = 0;
        let stairFee = 0;
        let otherFee = (carType ? 100 : 0) + (wheelchair ? 100 : 0);

        if (isNegotiate) {
            showResult(`<div style="color:red; font-weight:bold; text-align:center;">🌙 深夜時段 (23-07) <br>採里程議價，請來電洽詢！</div>`);
            return;
        }

        // 1. 計算基礎服務費 (跳錶加價 或 機場固定費)
        if (currentMode === 'meter') {
            let base = 300;
            if (hour >= 18) base = 400 + (hour - 18) * 100;
            if (dayType === 'weekday') baseFee = base;
            else if (dayType === 'sat') baseFee = (hour < 12) ? 300 : (hour < 18 ? 400 : base + 100);
            else if (dayType === 'sun') baseFee = (hour < 18) ? 400 : base + 100;
            else if (dayType === 'special') baseFee = base * 2;
        } else {
            let ap = parseInt(document.getElementById('airportPrice').value);
            baseFee = (ap === 0) ? parseInt(document.getElementById('customPrice').value || 0) : ap;
        }

        // 2. 計算爬梯服務費
        if (floor > 0) {
            let sBase = 800;
            if (floor >= 4) sBase += (floor - 3) * 100;
            let sTimeExtra = (hour >= 18) ? (hour - 17) * 100 : 0;
            let sDayExtra = (dayType === 'sat' || dayType === 'sun') ? 100 : 0;
            if (dayType === 'special') sDayExtra = 300;
            stairFee = sBase + sTimeExtra + sDayExtra;
        }

        // 3. 顯示結果
        let total = baseFee + stairFee + otherFee;
        let html = `
            <div style="font-size:1.1rem; border-bottom:1px solid #FFD3B6; padding-bottom:10px; margin-bottom:10px;">
                <b>💡 試算明細：</b><br>
                • ${currentMode === 'meter' ? '接送加價' : '預約/包車費'}：$${baseFee}<br>
                ${floor > 0 ? `• 爬梯服務：$${stairFee}<br>` : ''}
                ${otherFee > 0 ? `• 其他附加：$${otherFee}<br>` : ''}
            </div>
            <div style="text-align:center; font-weight:bold;">${currentMode === 'meter' ? '應收總額：跳錶 +' : '預約總額：'}</div>
            <div class="price-tag">$${total}</div>
        `;
        showResult(html);
    }

    function showResult(html) {
        document.getElementById('resultDetail').innerHTML = html;
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
